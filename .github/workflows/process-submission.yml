name: Process Hunt Submission

on:
  issues:
    types: [opened]

jobs:
  process:
    # Only run on submissions, not bot commits
    if: startsWith(github.event.issue.title, '[HUNT]')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Process submission
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_CREATED_AT: ${{ github.event.issue.created_at }}
        run: python3 .github/scripts/process_submission.py

      - name: Commit score update
        run: |
          git config user.name "GeoVision Hunt Bot"
          git config user.email "hunt-bot@noreply.github.com"
          git add data/scores.json
          git diff --staged --quiet || git commit -m "score: $(cat /tmp/commit_msg.txt) [skip ci]"
          git push

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '✓ Find registered.';
            try { comment = fs.readFileSync('/tmp/issue_comment.txt', 'utf8'); } catch(e) {}
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
